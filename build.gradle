plugins {
    id 'java'
}

group = 'fr.greanor'
version = '1.0'

repositories {
    mavenCentral()

    maven {
        url = "https://repo.papermc.io/repository/maven-public/"
    }
}

dependencies {
    compileOnly "io.papermc.paper:paper-api:1.21.1-R0.1-SNAPSHOT"
    compileOnly fileTree(dir: 'src/main/java/net/milkbowl/vault/economy', include: ['*.java'])
}

java {
    toolchain.languageVersion.set(JavaLanguageVersion.of(21))
}

tasks.register("copyJar", Copy) {
    dependsOn tasks.jar   // ✅ important

    from(tasks.jar.archiveFile)
    into("run/plugins")
}

tasks.build {
    finalizedBy("copyJar")
}
